<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Delicias Álvarez</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400;700&display=swap');

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{
  overflow-x:hidden;
}

.menu-wrap{
  font-family:'Lato',sans-serif;
  background:linear-gradient(135deg,#3d1c02 0%,#6b3a1f 50%,#3d1c02 100%);
  min-height:100vh;
  padding:0 0 2rem;
}

.header{
  text-align:center;
  padding:2rem 1rem 1rem;
  background:rgba(0,0,0,0.3);
}

.header h1{
  font-family:'Playfair Display',serif;
  color:#f5d89e;
  font-size:2.2rem;
  letter-spacing:2px;
}

.header p{
  color:#d4a96a;
  font-size:0.85rem;
  letter-spacing:3px;
  text-transform:uppercase;
  margin-top:4px;
}

.badge{
  display:inline-block;
  background:#d4a96a;
  color:#3d1c02;
  font-size:0.7rem;
  font-weight:700;
  padding:3px 10px;
  border-radius:12px;
  margin-top:8px;
}

.tabs{
  display:flex;
  justify-content:center;
  gap:8px;
  padding:1rem;
  flex-wrap:wrap;
}

.tab{
  background:rgba(255,255,255,0.1);
  color:#f5d89e;
  border:1px solid rgba(212,169,106,0.4);
  border-radius:20px;
  padding:8px 16px;
  cursor:pointer;
}

.tab.active{
  background:#d4a96a;
  color:#3d1c02;
  font-weight:bold;
}

.section{
  display:none;
  padding:0 1rem;
}

.section.active{
  display:block;
}

.section-title{
  font-family:'Playfair Display',serif;
  color:#f5d89e;
  font-size:1.1rem;
  text-align:center;
  margin:1rem 0;
}

.items-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}

.item-card{
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(212,169,106,0.25);
  border-radius:12px;
  padding:12px;
  position:relative;
}

.item-name{
  color:#f5d89e;
  font-size:0.85rem;
  font-weight:700;
  margin-bottom:4px;
}

.item-price{
  color:#d4a96a;
  font-size:1rem;
  font-weight:700;
}

.add-btn{
  position:absolute;
  bottom:8px;
  right:8px;
  background:#d4a96a;
  color:#3d1c02;
  border:none;
  border-radius:50%;
  width:28px;
  height:28px;
  cursor:pointer;
  font-size:1rem;
}

.item-qty{
  position:absolute;
  top:8px;
  right:8px;
  background:#fff;
  color:#000;
  border-radius:50%;
  width:22px;
  height:22px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:0.75rem;
}

.cart-bar{
  position:sticky;
  bottom:10px;
  margin:1rem;
  background:#d4a96a;
  border-radius:14px;
  padding:14px;
  display:none;
  justify-content:space-between;
  align-items:center;
  cursor:pointer;
}

.cart-bar-total{
  font-size:1.3rem;
  font-weight:bold;
}

.cart-modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  z-index:100;
  align-items:flex-end;
}

.cart-modal.open{
  display:flex;
}

.cart-sheet{
  background:#2a1200;
  width:100%;
  max-height:85vh;
  overflow-y:auto;
  border-radius:24px 24px 0 0;
  padding:1rem;
}

.cart-header{
  display:flex;
  justify-content:space-between;
  margin-bottom:1rem;
}

.cart-header h2{
  color:#f5d89e;
}

.close-btn{
  background:none;
  border:none;
  color:#fff;
  font-size:1.2rem;
  cursor:pointer;
}

.cart-item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 0;
  border-bottom:1px solid rgba(255,255,255,0.1);
}

.cart-item-name{
  color:#fff;
  flex:1;
}

.qty-btn{
  width:28px;
  height:28px;
  border:none;
  border-radius:6px;
  background:#d4a96a;
  cursor:pointer;
}

.cart-item-controls{
  display:flex;
  align-items:center;
  gap:8px;
}

.cart-total-row{
  display:flex;
  justify-content:space-between;
  margin-top:1rem;
  color:#fff;
}

.wa-btn{
  width:100%;
  margin-top:1rem;
  background:#25D366;
  border:none;
  padding:14px;
  border-radius:12px;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}

@media(max-width:768px){

  .header h1{
    font-size:1.7rem;
  }

  .items-grid{
    grid-template-columns:1fr;
  }

  .tab{
    width:100%;
  }

}
</style>
</head>

<body>

<div class="menu-wrap">

<div class="header">
<h1>Delicias Álvarez</h1>
<p>Te ofrece</p>
<span class="badge">Menú Cafetería</span>
</div>

<div class="tabs">
<button class="tab active" onclick="showSection('refacciones',event)">Refacciones</button>
<button class="tab" onclick="showSection('bebidas',event)">Bebidas</button>
<button class="tab" onclick="showSection('postres',event)">Postres</button>
</div>

<div class="section active" id="sec-refacciones">
<div class="section-title">Refacciones</div>
<div class="items-grid" id="grid-refacciones"></div>
</div>

<div class="section" id="sec-bebidas">
<div class="section-title">Bebidas</div>
<div class="items-grid" id="grid-bebidas"></div>
</div>

<div class="section" id="sec-postres">
<div class="section-title">Postres</div>
<div class="items-grid" id="grid-postres"></div>
</div>

<div class="cart-bar" id="cart-bar" onclick="openCart()">
<div>
<div><strong>🛒 Ver pedido</strong></div>
<div id="cart-count-label">0 productos</div>
</div>
<div class="cart-bar-total" id="cart-bar-total">Q0</div>
</div>

</div>

<div class="cart-modal" id="cart-modal">
<div class="cart-sheet">

<div class="cart-header">
<h2>Tu pedido</h2>
<button class="close-btn" onclick="closeCart()">✕</button>
</div>

<div id="cart-items-list"></div>

<div class="cart-total-row">
<span>Total</span>
<span id="cart-total-display">Q0</span>
</div>

<button class="wa-btn" onclick="sendWhatsApp()">
Enviar pedido por WhatsApp
</button>

</div>
</div>

<script>

const WA_NUMBER='50234893358';

const menuData={
refacciones:[
{name:'Hamburguesa doble',price:45},
{name:'Hamburguesa simple',price:35},
{name:'Sandwich de jamón',price:10},
{name:'Plátanos fritos',price:8}
],

bebidas:[
{name:'Licuados',price:14},
{name:'Frappes',price:25},
{name:'Café',price:7}
],

postres:[
{name:'Crepes',price:27},
{name:'Waffles',price:25},
{name:'Flan',price:10}
]
};

let cart={};

function renderGrid(id,items){

const grid=document.getElementById(id);

grid.innerHTML='';

items.forEach((item,i)=>{

const key=id+i;
const qty=cart[key]?.qty||0;

grid.innerHTML+=`

<div class="item-card">

<div class="item-name">${item.name}</div>

<div class="item-price">Q${item.price}</div>

${qty>0?`<div class="item-qty">${qty}</div>`:''}

<button class="add-btn"
onclick="addItem('${key}','${item.name}',${item.price})">
+
</button>

</div>
`;
});
}

function renderAll(){

renderGrid('grid-refacciones',menuData.refacciones);
renderGrid('grid-bebidas',menuData.bebidas);
renderGrid('grid-postres',menuData.postres);

updateCartBar();
}

function addItem(key,name,price){

if(!cart[key]){
cart[key]={name,price,qty:0};
}

cart[key].qty++;

renderAll();
}

function updateCartBar(){

const keys=Object.keys(cart);

const total=keys.reduce((s,k)=>s+cart[k].price*cart[k].qty,0);

const count=keys.reduce((s,k)=>s+cart[k].qty,0);

const bar=document.getElementById('cart-bar');

if(count>0){

bar.style.display='flex';

document.getElementById('cart-bar-total').textContent='Q'+total;

document.getElementById('cart-count-label').textContent=count+' productos';

}else{
bar.style.display='none';
}
}

function openCart(){

document.getElementById('cart-modal').classList.add('open');

renderCartList();
}

function closeCart(){

document.getElementById('cart-modal').classList.remove('open');
}

function renderCartList(){

const list=document.getElementById('cart-items-list');

const keys=Object.keys(cart);

let total=0;

list.innerHTML='';

keys.forEach(k=>{

const item=cart[k];

total+=item.price*item.qty;

list.innerHTML+=`

<div class="cart-item">

<div class="cart-item-name">
${item.name} x${item.qty}
</div>

<div>
Q${item.price*item.qty}
</div>

</div>
`;
});

document.getElementById('cart-total-display').textContent='Q'+total;
}

function sendWhatsApp(){

const keys=Object.keys(cart);

let msg='🍽️ Pedido:%0A%0A';

let total=0;

keys.forEach(k=>{

const item=cart[k];

msg+=`${item.name} x${item.qty} - Q${item.price*item.qty}%0A`;

total+=item.price*item.qty;
});

msg+=`%0A Total: Q${total}`;

window.open(`https://wa.me/${WA_NUMBER}?text=${msg}`);
}

function showSection(id,e){

document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));

document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));

document.getElementById('sec-'+id).classList.add('active');

e.target.classList.add('active');
}

renderAll();

</script>

</body>
</html>
